name: Sincronizar con Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Forzar subida a Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://Malkyrick:$HF_TOKEN@huggingface.co/spaces/Malkyrick/ia-gemini-chat
          git push --force hf main
