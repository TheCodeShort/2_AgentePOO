name: Sincronizar con Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Forzar subida a Hugging Face sin archivos binarios
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Remover del envio temporal las carpetas de datos pesados
          git rm -r --cached chroma_db/ data/ || echo "Carpetas no encontradas"
          git commit -m "Excluir binarios para Hugging Face" || echo "Sin cambios"
          
          # Enviar solo codigo limpio hacia Hugging Face
          git remote add hf https://Malkyrick:$HF_TOKEN@huggingface.co/spaces/Malkyrick/ia-gemini-chat
          git push --force hf main
